<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Knowledge Journal</title>
    <style>
        body {
            background-color: #ffccdd; /* Pastel pink */
            font-family: 'Pixelated', sans-serif; /* Custom pixelated font */
            margin: 0;
            padding: 0;
            color: #002147; /* Navy blue text */
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
        }
        .board {
            width: 300px;
            margin: 10px;
            padding: 15px;
            background: white;
            border: 1px solid #ddd;
            box-shadow: 2px 2px 12px rgba(0,0,0,0.1);
            border-radius: 5px;
        }
        .button {
            background-color: #99ff99; /* Light green */
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
        /* Image slider styles */
        .slider {
            width: 100%;
            overflow: hidden;
        }
        .slides {
            display: flex;
            transition: transform 0.5s ease;
        }
        .slide {
            min-width: 100%;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Knowledge Journal</h1>
    <div class="container">
        <div class="board">
            <h2>Entry Title</h2>
            <div class="slider">
                <div class="slides">
                    <div class="slide"><img src="image1.jpg" alt="Entry Image 1"></div>
                    <div class="slide"><img src="image2.jpg" alt="Entry Image 2"></div>
                    <div class="slide"><img src="image3.jpg" alt="Entry Image 3"></div>
                </div>
            </div>
            <button class="button">Edit Entry</button>
        </div>
        <!-- Additional entries here -->
    </div>
    <script>
        // JavaScript for image slider functionality
        let currentIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;
        function showSlide(index) {
            const slidesContainer = document.querySelector('.slides');
            const offset = -index * 100;
            slidesContainer.style.transform = `translateX(${offset}%)`;
        }
        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            showSlide(currentIndex);
        }
        setInterval(nextSlide, 3000); // Change slide every 3 seconds
    </script>
</body>
</html>
