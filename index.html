<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Knowledge Journal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  :root {
    --bg: #fce4ec;
    --bg2: #f8bbd0;
    --text: #0d1b4b;
    --btn: #a5d6a7;
    --btn-hover: #81c784;
    --btn-danger: #ef9a9a;
    --btn-danger-hover: #e57373;
    --card-bg: #fff5f8;
    --border: #f48fb1;
    --shadow: rgba(13,27,75,0.10);
    --accent: #ce93d8;
    --pixel: 'Press Start 2P', monospace;
    --mono: 'VT323', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 20%, #fce4ec 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #f8bbd0 0%, transparent 40%),
      url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='2' height='2' fill='%23f48fb1' fill-opacity='0.18'/%3E%3C/svg%3E");
    color: var(--text);
    font-family: var(--pixel);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 48px 20px 24px;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    margin: 20px auto 0;
    width: 80%;
    height: 4px;
    background: repeating-linear-gradient(90deg, var(--border) 0, var(--border) 8px, transparent 8px, transparent 16px);
  }
  header h1 {
    font-size: clamp(14px, 3vw, 24px);
    color: var(--text);
    text-shadow: 3px 3px 0 var(--border);
    letter-spacing: 2px;
    line-height: 1.6;
  }
  header p {
    font-family: var(--mono);
    font-size: clamp(16px, 2.5vw, 22px);
    color: var(--text);
    opacity: 0.75;
    margin-top: 14px;
    letter-spacing: 1px;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    justify-content: center;
    gap: 14px;
    padding: 24px 20px 8px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: var(--pixel);
    font-size: 9px;
    padding: 10px 18px;
    background: var(--btn);
    color: var(--text);
    border: 3px solid var(--text);
    box-shadow: 4px 4px 0 var(--text);
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
    letter-spacing: 1px;
    outline: none;
    image-rendering: pixelated;
  }
  .btn:hover { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--text); background: var(--btn-hover); }
  .btn:active { transform: translate(4px,4px); box-shadow: 0 0 0 var(--text); }
  .btn.danger { background: var(--btn-danger); }
  .btn.danger:hover { background: var(--btn-danger-hover); }
  .btn.accent { background: var(--accent); color: #fff; }

  /* ── SEARCH ── */
  .search-wrap {
    display: flex;
    justify-content: center;
    padding: 10px 20px 20px;
  }
  .search-wrap input {
    font-family: var(--mono);
    font-size: 18px;
    padding: 8px 16px;
    border: 3px solid var(--text);
    background: var(--card-bg);
    color: var(--text);
    width: min(420px, 100%);
    outline: none;
    box-shadow: 3px 3px 0 var(--border);
  }
  .search-wrap input::placeholder { opacity: 0.5; }

  /* ── MASONRY GRID ── */
  .grid {
    column-count: 4;
    column-gap: 18px;
    padding: 10px 28px;
  }
  @media(max-width:1100px){ .grid{ column-count:3; } }
  @media(max-width:750px){ .grid{ column-count:2; } }
  @media(max-width:480px){ .grid{ column-count:1; } }

  /* ── CARD ── */
  .card {
    break-inside: avoid;
    background: var(--card-bg);
    border: 3px solid var(--text);
    box-shadow: 5px 5px 0 var(--border);
    margin-bottom: 18px;
    padding: 0;
    position: relative;
    transition: transform .15s, box-shadow .15s;
    cursor: default;
    animation: popIn .25s ease both;
  }
  @keyframes popIn {
    from { opacity:0; transform: scale(.93) translateY(8px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }
  .card:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--border); }

  /* slider */
  .slider { position: relative; overflow: hidden; background: #f8d7e3; }
  .slider-track { display: flex; transition: transform .35s cubic-bezier(.4,0,.2,1); }
  .slider-track img {
    min-width: 100%; max-width: 100%; height: 180px;
    object-fit: cover; display: block;
    image-rendering: auto;
  }
  .slider-nav {
    position: absolute; top:50%; transform: translateY(-50%);
    display: flex; justify-content: space-between; width: 100%; padding: 0 6px;
    pointer-events: none;
  }
  .slider-nav button {
    pointer-events: all;
    font-family: var(--pixel); font-size: 10px;
    background: var(--card-bg); border: 2px solid var(--text);
    box-shadow: 2px 2px 0 var(--text); padding: 4px 8px;
    cursor: pointer; color: var(--text);
  }
  .slider-nav button:hover { background: var(--btn); }
  .slider-dots {
    text-align: center; padding: 4px 0 2px; background: #f8d7e3;
  }
  .slider-dots span {
    display: inline-block; width:8px; height:8px;
    background: var(--border); margin: 0 2px;
    border: 1px solid var(--text); cursor: pointer;
  }
  .slider-dots span.active { background: var(--text); }

  .card-body { padding: 14px 14px 10px; }
  .card-title {
    font-family: var(--pixel);
    font-size: 9px;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: 1px;
    word-break: break-word;
  }
  .card-tags {
    display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px;
  }
  .tag {
    font-family: var(--mono); font-size: 14px;
    background: var(--bg2); border: 2px solid var(--border);
    padding: 1px 7px; color: var(--text);
  }
  .card-text {
    font-family: var(--mono); font-size: 16px;
    color: var(--text); line-height: 1.5;
    word-break: break-word; white-space: pre-wrap;
    max-height: 120px; overflow: hidden;
    position: relative;
  }
  .card-text.expanded { max-height: none; }
  .card-date {
    font-family: var(--mono); font-size: 13px;
    color: var(--text); opacity: .55; margin-top: 8px;
  }
  .card-actions {
    display: flex; gap: 8px; padding: 10px 14px 12px; flex-wrap: wrap;
  }
  .card-actions .btn { font-size: 7px; padding: 7px 12px; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 60px 20px;
    font-family: var(--mono); font-size: 22px;
    color: var(--text); opacity: .55;
  }
  .empty span { display:block; font-size: 48px; margin-bottom: 12px; }

  /* ── MODAL OVERLAY ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(13,27,75,.45); z-index: 100;
    justify-content: center; align-items: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card-bg);
    border: 4px solid var(--text);
    box-shadow: 8px 8px 0 var(--border);
    width: min(560px, 100%);
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px 24px 20px;
    position: relative;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity:0; }
    to   { transform: translateY(0); opacity:1; }
  }
  .modal h2 {
    font-family: var(--pixel); font-size: 11px; color: var(--text);
    margin-bottom: 20px; letter-spacing: 1px;
    text-shadow: 2px 2px 0 var(--border);
  }
  .modal label {
    font-family: var(--pixel); font-size: 8px;
    display: block; margin-bottom: 5px; color: var(--text);
  }
  .modal input[type=text],
  .modal textarea {
    font-family: var(--mono); font-size: 18px;
    width: 100%; padding: 8px 10px;
    border: 3px solid var(--text);
    background: var(--bg);
    color: var(--text);
    margin-bottom: 16px;
    outline: none;
    resize: vertical;
  }
  .modal textarea { min-height: 110px; }
  .modal input[type=text]:focus,
  .modal textarea:focus { border-color: var(--accent); }

  /* image upload area */
  .img-upload-area {
    border: 3px dashed var(--border);
    padding: 18px; text-align: center;
    margin-bottom: 14px; cursor: pointer;
    background: var(--bg);
    font-family: var(--mono); font-size: 17px;
    color: var(--text); opacity: .8;
    transition: background .15s;
  }
  .img-upload-area:hover { background: var(--bg2); }
  .img-upload-area input { display:none; }

  .img-preview-strip {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
  }
  .img-thumb {
    position: relative; width: 72px; height: 72px;
    border: 2px solid var(--text); overflow: hidden;
  }
  .img-thumb img { width:100%; height:100%; object-fit:cover; }
  .img-thumb button {
    position: absolute; top:0; right:0;
    background: var(--btn-danger); border: none;
    font-size: 13px; line-height:1; cursor: pointer;
    padding: 1px 5px; color: var(--text);
    font-family: var(--pixel);
  }

  .modal-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--card-bg);
    font-family: var(--pixel); font-size: 8px;
    padding: 12px 22px; border: 3px solid var(--border);
    box-shadow: 4px 4px 0 var(--border);
    opacity: 0; pointer-events: none;
    transition: opacity .2s; z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── MODAL ERROR ── */
  .modal-error {
    font-family: var(--mono); font-size: 16px;
    color: #c0392b; background: #fce4e4;
    border: 2px solid #e57373; padding: 6px 12px;
    margin-bottom: 12px; display: none;
  }
  .modal-error.show { display: block; }

  /* ── DELETE CONFIRM ── */
  .delete-confirm {
    display: none; position: absolute; inset: 0;
    background: rgba(255,245,248,.97);
    border: 3px solid var(--btn-danger);
    z-index: 10; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 20px; text-align: center;
  }
  .delete-confirm.show { display: flex; }
  .delete-confirm p {
    font-family: var(--pixel); font-size: 8px;
    color: var(--text); line-height: 1.8;
  }
  .delete-confirm .dc-btns { display: flex; gap: 10px; }

  /* ── PIXEL SCROLLBAR ── */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border: 2px solid var(--text); }

  /* ── read-more toggle ── */
  .read-more {
    font-family: var(--pixel); font-size: 7px;
    background: none; border: none; cursor: pointer;
    color: var(--accent); display: block; margin-top: 4px;
    padding: 0;
  }
</style>
</head>
<body>

<header>
  <h1>✦ My Knowledge Journal ✦</h1>
  <p>An infinite chamber of curiosities that transcends conventional norms of learning</p>
</header>

<div class="toolbar">
  <button class="btn accent" onclick="openModal()">＋ New Entry</button>
  <button class="btn" onclick="sortBy('date')">⏱ Sort by Date</button>
  <button class="btn" onclick="sortBy('title')">🔡 Sort by Title</button>
</div>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="🔍 search entries..." oninput="renderGrid()">
</div>

<div class="grid" id="grid"></div>
<div class="empty" id="emptyState" style="display:none">
  <span>✨</span>
  Your journal is empty...<br>Add your first entry!
</div>

<div id="toast"></div>

<!-- ── ADD / EDIT MODAL ── -->
<div class="overlay" id="overlay" onclick="closeIfOutside(event)">
  <div class="modal" id="modal">
    <h2 id="modalTitle">✦ New Entry</h2>
    <div class="modal-error" id="modalError"></div>

    <label>ENTRY TITLE</label>
    <input type="text" id="fTitle" placeholder="What did you learn?">

    <label>TAGS (comma separated)</label>
    <input type="text" id="fTags" placeholder="e.g. science, history, art">

    <label>NOTES</label>
    <textarea id="fNotes" placeholder="Write your thoughts, discoveries, insights..."></textarea>

    <label>IMAGES (up to 10 MB each)</label>
    <div class="img-upload-area" onclick="document.getElementById('fImages').click()">
      📎 Click to attach images
      <input type="file" id="fImages" accept="image/*" multiple onchange="handleImgSelect(event)">
    </div>
    <div class="img-preview-strip" id="imgPreviewStrip"></div>

    <div class="modal-actions">
      <button class="btn" onclick="saveEntry()">💾 Save Entry</button>
      <button class="btn danger" onclick="closeModal()">✕ Cancel</button>
    </div>
  </div>
</div>

<script>
// ── Storage strategy ──
// Text metadata  → localStorage  (tiny, fast)
// Image blobs    → IndexedDB     (no size limit)

const DB_NAME = 'kj_db', DB_VER = 1, STORE = 'images';
let db = null;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e.target.error);
  });
}

function idbPut(key, value) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(value, key);
    tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
  });
}

function idbGet(key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror   = e => rej(e.target.error);
  });
}

function idbDel(key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(key);
    tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
  });
}

// ── App state ──
// entries[] stores only text: { id, title, tags, notes, date, imageCount }
// Images stored in IDB as key `img_<entryId>` → array of {dataUrl, name}

let entries = [];
let editingId = null;
let pendingImages = [];
let sortMode = 'date';

function saveMetadata() {
  const slim = entries.map(({id,title,tags,notes,date,imageCount}) =>
    ({id,title,tags,notes,date,imageCount}));
  localStorage.setItem('kj_entries', JSON.stringify(slim));
}

async function saveImages(entryId, images) {
  if (images.length > 0) {
    await idbPut(`img_${entryId}`, images);
  } else {
    await idbDel(`img_${entryId}`);
  }
}

async function loadImages(entryId) {
  return (await idbGet(`img_${entryId}`)) || [];
}

/* ── MODAL ── */
function openModal(id = null) {
  editingId = id;
  pendingImages = [];
  document.getElementById('modalTitle').textContent = id ? '✦ Edit Entry' : '✦ New Entry';

  if (id) {
    const e = entries.find(x => x.id === id);
    document.getElementById('fTitle').value = e.title;
    document.getElementById('fTags').value = e.tags.join(', ');
    document.getElementById('fNotes').value = e.notes;
    // Load images from IDB into pendingImages
    loadImages(id).then(imgs => {
      pendingImages = [...imgs];
      renderImgStrip();
    });
  } else {
    document.getElementById('fTitle').value = '';
    document.getElementById('fTags').value = '';
    document.getElementById('fNotes').value = '';
  }
  renderImgStrip();
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
  pendingImages = [];
}

function closeIfOutside(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function handleImgSelect(e) {
  const files = [...e.target.files];
  const MAX = 10 * 1024 * 1024;
  files.forEach(f => {
    if (f.size > MAX) { showToast(`"${f.name}" exceeds 10 MB — skipped.`); return; }
    const r = new FileReader();
    r.onload = ev => {
      pendingImages.push({ dataUrl: ev.target.result, name: f.name });
      renderImgStrip();
    };
    r.readAsDataURL(f);
  });
  e.target.value = '';
}

function renderImgStrip() {
  const strip = document.getElementById('imgPreviewStrip');
  strip.innerHTML = '';
  pendingImages.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'img-thumb';
    div.innerHTML = `<img src="${img.dataUrl}" alt="${img.name}">
      <button onclick="removeImg(${i})" title="Remove">✕</button>`;
    strip.appendChild(div);
  });
}

function removeImg(i) {
  pendingImages.splice(i, 1);
  renderImgStrip();
}

async function saveEntry() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showModalError('⚠ Please enter a title!'); return; }
  const tags  = document.getElementById('fTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const notes = document.getElementById('fNotes').value.trim();
  const wasEditing = !!editingId;

  if (editingId) {
    const idx = entries.findIndex(x => x.id === editingId);
    entries[idx] = { ...entries[idx], title, tags, notes, imageCount: pendingImages.length };
    await saveImages(editingId, pendingImages);
  } else {
    const id = Date.now().toString();
    entries.unshift({ id, title, tags, notes, imageCount: pendingImages.length, date: new Date().toISOString() });
    await saveImages(id, pendingImages);
  }

  saveMetadata();
  closeModal();
  await renderGrid();
  showToast(wasEditing ? '✦ Entry updated!' : '✦ Entry saved!');
}

function deleteEntry(id) {
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (!card || card.querySelector('.delete-confirm')) return;
  const dc = document.createElement('div');
  dc.className = 'delete-confirm show';
  dc.innerHTML = `
    <p>Delete this entry?<br>This cannot be undone.</p>
    <div class="dc-btns">
      <button class="btn danger" onclick="confirmDelete('${id}')">🗑 Delete</button>
      <button class="btn" onclick="cancelDelete('${id}')">✕ Cancel</button>
    </div>`;
  card.appendChild(dc);
}

async function confirmDelete(id) {
  entries = entries.filter(x => x.id !== id);
  await idbDel(`img_${id}`);
  saveMetadata();
  await renderGrid();
  showToast('Entry deleted!');
}

function cancelDelete(id) {
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) { const dc = card.querySelector('.delete-confirm'); if (dc) dc.remove(); }
}

/* ── SORT ── */
function sortBy(mode) { sortMode = mode; renderGrid(); }

/* ── RENDER ── */
async function renderGrid() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = entries.filter(e =>
    e.title.toLowerCase().includes(q) ||
    e.notes.toLowerCase().includes(q) ||
    e.tags.some(t => t.toLowerCase().includes(q))
  );
  if (sortMode === 'title') list = [...list].sort((a,b) => a.title.localeCompare(b.title));
  else list = [...list].sort((a,b) => new Date(b.date) - new Date(a.date));

  const grid  = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = '';

  if (!list.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  // Load all images in parallel
  const imageMap = {};
  await Promise.all(list.map(async e => {
    if (e.imageCount > 0) imageMap[e.id] = await loadImages(e.id);
    else imageMap[e.id] = [];
  }));

  list.forEach(e => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = e.id;

    const imgs = imageMap[e.id] || [];
    let sliderHtml = '';
    if (imgs.length > 0) {
      const imgTags = imgs.map(img => `<img src="${img.dataUrl}" alt="${escHtml(img.name)}">`).join('');
      const dots    = imgs.map((_,i) => `<span class="${i===0?'active':''}" onclick="slideTo('${e.id}',${i})"></span>`).join('');
      const nav     = imgs.length > 1
        ? `<div class="slider-nav">
            <button onclick="slide('${e.id}',-1)">◀</button>
            <button onclick="slide('${e.id}',1)">▶</button>
           </div>` : '';
      sliderHtml = `
        <div class="slider" id="slider-${e.id}">
          <div class="slider-track" id="track-${e.id}">${imgTags}</div>
          ${nav}
        </div>
        <div class="slider-dots" id="dots-${e.id}">${dots}</div>`;
    }

    const tagsHtml = e.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
    const date     = new Date(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const longText = e.notes.length > 200;

    card.innerHTML = `
      ${sliderHtml}
      <div class="card-body">
        <div class="card-title">${escHtml(e.title)}</div>
        ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
        <div class="card-text" id="txt-${e.id}">${escHtml(e.notes)}</div>
        ${longText ? `<button class="read-more" id="rm-${e.id}" onclick="toggleExpand('${e.id}')">▼ read more</button>` : ''}
        <div class="card-date">📅 ${date}</div>
      </div>
      <div class="card-actions">
        <button class="btn" onclick="openModal('${e.id}')">✏️ Edit</button>
        <button class="btn danger" onclick="deleteEntry('${e.id}')">🗑 Delete</button>
      </div>`;
    grid.appendChild(card);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleExpand(id) {
  const el  = document.getElementById(`txt-${id}`);
  const btn = document.getElementById(`rm-${id}`);
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? '▲ collapse' : '▼ read more';
}

/* ── SLIDER ── */
const sliderState = {};
function slide(id, dir) {
  const entry = entries.find(e => e.id === id);
  if (!entry) return;
  const total = entry.imageCount || 0;
  sliderState[id] = ((sliderState[id] ?? 0) + dir + total) % total;
  applySlide(id);
}
function slideTo(id, idx) {
  sliderState[id] = idx;
  applySlide(id);
}
function applySlide(id) {
  const idx    = sliderState[id] ?? 0;
  const track  = document.getElementById(`track-${id}`);
  if (track) track.style.transform = `translateX(-${idx * 100}%)`;
  const dotsEl = document.getElementById(`dots-${id}`);
  if (dotsEl) [...dotsEl.querySelectorAll('span')].forEach((d,i) => d.classList.toggle('active', i===idx));
}

/* ── TOASTS ── */
function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}
function showModalError(msg) {
  const el = document.getElementById('modalError');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

/* ── INIT ── */
openDB().then(() => {
  entries = JSON.parse(localStorage.getItem('kj_entries') || '[]');
  renderGrid();
}).catch(err => {
  showToast('⚠ Storage error: ' + err.message);
});
</script>
